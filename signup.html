<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign Up</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">

</head>

<body>

  <div class="container-fluid vh-100">
    <div class="row h-100">




      <!-- LEFT SIDE -->
      <div class="col-md-6 d-flex align-items-center flex-column justify-content-center  ">


<div class="image ">
  <img src="./assets/logo without bg.png" width="200px" alt="">
</div>

        <div class="form-box ">

          <h2 class="mb-4 main-heading">Get Started Now</h2>

          <form>

            <div class="name mb-4">
              <label for="">Name</label>
              <input type="text" class="input-field form-control mb-3" placeholder="Enter your name">
            </div>

            <div class="email mb-4">
              <label for="">Email</label>
              <input type="email" class="input-field form-control mb-3" placeholder="Enter your  Email Address">
            </div>

            <div class="password mb-4">
              <label for="">Password</label>
              <input type="password" class="input-field  form-control mb-3" placeholder="Password">
            </div>


            <div class="form-check mb-3 d-flex align-items-center py-3 gap-2">
              <input class="form-check-input" type="checkbox">
              <label class="form-check-label">
                I agree to the terms & policy
              </label>
            </div>

            <button class="btn btn-danger w-100">Sign Up</button>
          </form>

          <div class="d-flex align-items-center my-5">
  <hr class="flex-grow-1">
  <span class="mx-2 mySpan">Or</span>
  <hr class="flex-grow-1">
</div>

          <div class="d-flex gap-2 mt-3">
            <button class="btn btn-outline-secondary w-50 d-flex gap-2">
              <img src="./assets/google icon.png" width="20px" alt="">
              Sign in with Google</button>
            <button class="btn btn-outline-secondary d-flex gap-2 w-50">
              <img src="./assets/apple.png" width="20px" alt="">
              Sign in with Apple</button>
          </div>

          <p class="mt-4 text-center last-text">
            Have an account? <a href="login.html">Sign in</a>
          </p>

        </div>
      </div>

      <!-- RIGHT SIDE -->
      <div class="col-md-6 right-side  d-md-flex align-items-center justify-content-center">
        <img src="./assets/logo without bg.png" width="300px" alt="">
      </div>

    </div>
  </div>

</body>

</html>
